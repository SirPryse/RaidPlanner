<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>War Table — Lost Ark Raid Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0B10; --panel:#14161F; --panel2:#1B1E2A;
  --line:#2A2E3D; --line-soft:#21242F;
  --gold:#D9B45B; --gold-bright:#F0D389; --gold-dim:#8A7430;
  --dps:#E5484D; --dps-soft:rgba(229,72,77,.14); --dps-line:rgba(229,72,77,.4);
  --sup:#2FB67E; --sup-soft:rgba(47,182,126,.14); --sup-line:rgba(47,182,126,.42);
  --teal:#56C2D6; --amber:#E0A93B; --amber-soft:rgba(224,169,59,.12);
  --text:#E9E5D8; --muted:#8C8FA0; --dim:#5E6173;
  --r:14px; --r-sm:9px;
  --display:"Cinzel",Georgia,serif;
  --body:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --data:"Space Grotesk",ui-monospace,SFMono-Regular,Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--body);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
body{
  background:
    radial-gradient(1100px 600px at 78% -8%, rgba(217,180,91,.06), transparent 60%),
    radial-gradient(900px 600px at 0% 100%, rgba(86,194,214,.05), transparent 55%),
    var(--bg);
  min-height:100vh;
}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input,select{font-family:inherit;color:var(--text);font-size:14px}
::selection{background:rgba(217,180,91,.3)}

/* ---------- shell ---------- */
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}
.topbar{position:sticky;top:0;z-index:30;
  backdrop-filter:blur(10px);
  background:linear-gradient(180deg, rgba(10,11,16,.92), rgba(10,11,16,.72));
  border-bottom:1px solid var(--line)}
.topbar-inner{max-width:1180px;margin:0 auto;padding:16px 20px 14px;
  display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.wordmark{font-family:var(--display);font-weight:700;letter-spacing:.14em;
  font-size:23px;color:var(--gold-bright);text-transform:uppercase;line-height:1;
  text-shadow:0 1px 0 rgba(0,0,0,.6)}
.wordmark .x{color:var(--dim)}
.tagline{font-size:12px;color:var(--muted);letter-spacing:.02em}
.tabs{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);
  border-radius:999px;padding:4px}
.tab{padding:8px 18px;border-radius:999px;font-weight:600;font-size:13.5px;color:var(--muted);
  letter-spacing:.02em;transition:.16s}
.tab:hover{color:var(--text)}
.tab.active{background:linear-gradient(180deg,#23262f,#191c25);color:var(--gold-bright);
  box-shadow:inset 0 0 0 1px var(--gold-dim)}
.gear{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);
  background:var(--panel);display:grid;place-items:center;color:var(--muted);transition:.16s}
.gear:hover{color:var(--gold-bright);border-color:var(--gold-dim)}

/* ---------- stat strip ---------- */
.stats{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0 26px}
.stat{flex:1;min-width:140px;background:var(--panel);border:1px solid var(--line);
  border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden}
.stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
.stat.s-dps::before{background:var(--dps)} .stat.s-sup::before{background:var(--sup)}
.stat.s-fill::before{background:var(--amber)}
.stat .n{font-family:var(--data);font-size:27px;font-weight:600;line-height:1;color:var(--text)}
.stat .l{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:7px}

.eyebrow{font-family:var(--display);font-weight:600;letter-spacing:.22em;font-size:11.5px;
  color:var(--gold);text-transform:uppercase;margin:0 0 4px}
.section-head{display:flex;align-items:baseline;gap:14px;margin:8px 2px 16px;flex-wrap:wrap}
.section-head h2{font-family:var(--display);font-weight:600;font-size:20px;margin:0;letter-spacing:.04em}
.section-head .hint{font-size:13px;color:var(--muted)}

/* ---------- roster ---------- */
.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:14px 14px 10px;display:flex;flex-direction:column;gap:8px;transition:.16s}
.pcard:hover{border-color:#363b4d}
.pcard.you{box-shadow:inset 0 0 0 1px var(--gold-dim);
  background:linear-gradient(180deg, rgba(217,180,91,.05), transparent 40%), var(--panel)}
.pcard-head{display:flex;align-items:center;gap:8px}
.pname{flex:1;background:transparent;border:none;border-bottom:1px dashed transparent;
  font-weight:700;font-size:16px;padding:3px 2px;border-radius:4px}
.pname:hover{border-bottom-color:var(--line)}
.pname:focus{outline:none;border-bottom-color:var(--gold-dim);background:rgba(255,255,255,.02)}
.you-badge{font-family:var(--display);font-size:9px;letter-spacing:.12em;color:var(--gold-bright);
  border:1px solid var(--gold-dim);border-radius:5px;padding:2px 6px;text-transform:uppercase}
.icon-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--dim);transition:.14s}
.icon-btn:hover{color:var(--dps);background:rgba(229,72,77,.1)}
.char{display:flex;flex-direction:column;gap:7px;background:var(--panel2);border:1px solid var(--line-soft);
  border-radius:var(--r-sm);padding:8px}
.char-top{display:flex;align-items:center;gap:8px;min-width:0}
.char-bot{display:flex;align-items:center;gap:8px}
.glyph{width:26px;height:26px;border-radius:6px;display:grid;place-items:center;flex-shrink:0}
.glyph.dps{background:var(--dps-soft);color:var(--dps);box-shadow:inset 0 0 0 1px var(--dps-line)}
.glyph.sup{background:var(--sup-soft);color:var(--sup);box-shadow:inset 0 0 0 1px var(--sup-line)}
.cls-img{width:90%;height:90%;object-fit:contain;display:block}
.cls-fallback{display:none;align-items:center;justify-content:center}
.cname{flex:1;background:transparent;border:none;font-weight:600;font-size:13.5px;padding:2px;min-width:0}
.cp{font-family:var(--data);font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.cp.dps{color:var(--dps)} .cp.sup{color:var(--sup)}
.cname:focus{outline:none;background:rgba(255,255,255,.03);border-radius:4px}
.ilvl-in{width:78px;flex:0 0 auto;background:var(--bg);border:1px solid var(--line);border-radius:6px;
  font-family:var(--data);font-size:13px;text-align:left;padding:4px 7px;color:var(--text)}
.ilvl-in:focus{outline:none;border-color:var(--gold-dim)}
.role-sel{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:4px 6px;
  font-size:12px;color:var(--muted);flex:0 0 auto}
.role-sel:focus{outline:none;border-color:var(--gold-dim)}
.brk{font-family:var(--data);font-size:10.5px;color:var(--dim);white-space:nowrap;text-align:right;margin-left:auto}
.brk.none{color:var(--dps)}
.char .icon-btn{width:24px;height:24px;flex:0 0 auto}
.char-list{display:flex;flex-direction:column;gap:8px;max-height:30rem;overflow-y:auto;
  padding-right:3px;scrollbar-width:thin;scrollbar-color:var(--line) transparent}
.char-list::-webkit-scrollbar{width:8px}
.char-list::-webkit-scrollbar-track{background:transparent}
.char-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.char-list::-webkit-scrollbar-thumb:hover{background:#3a3f52}
.addrow{display:flex;gap:8px;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:9px;padding:8px 13px;
  font-weight:600;font-size:13px;border:1px solid var(--line);background:var(--panel2);
  color:var(--muted);transition:.15s}
.btn:hover{color:var(--text);border-color:#3a3f52}
.btn.ghost{background:transparent}
.btn.gold{background:linear-gradient(180deg,#2a2616,#1d1a0f);color:var(--gold-bright);
  border-color:var(--gold-dim)}
.btn.gold:hover{box-shadow:0 0 0 1px var(--gold-dim),0 6px 18px rgba(217,180,91,.12)}
.btn.full{width:100%;justify-content:center}
.add-player{margin-top:14px}

/* ---------- schedule ---------- */
.raid{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  margin-bottom:14px;overflow:hidden;position:relative}
.raid::before{content:"";position:absolute;inset:0 auto 0 0;width:3px}
.raid.ready::before{background:var(--sup)}
.raid.partial::before{background:var(--amber)}
.raid.empty::before{background:var(--line)}
.raid-head{display:flex;align-items:center;gap:12px;padding:15px 18px;flex-wrap:wrap;
  border-bottom:1px solid var(--line-soft)}
.raid-title{font-family:var(--display);font-weight:600;font-size:17px;letter-spacing:.05em}
.size-badge{font-family:var(--data);font-size:11px;letter-spacing:.04em;color:var(--muted);
  border:1px solid var(--line);border-radius:6px;padding:3px 8px}
.size-badge b{color:var(--teal);font-weight:600}
.raid-meta{margin-left:auto;display:flex;gap:16px;align-items:center}
.rm{font-family:var(--data);font-size:12px;color:var(--muted);display:flex;gap:6px;align-items:center}
.rm b{color:var(--text);font-weight:600}
.status-pill{font-size:11px;font-weight:600;letter-spacing:.04em;padding:4px 10px;border-radius:999px;text-transform:uppercase}
.status-pill.ready{color:var(--sup);background:var(--sup-soft);box-shadow:inset 0 0 0 1px var(--sup-line)}
.status-pill.partial{color:var(--amber);background:var(--amber-soft);box-shadow:inset 0 0 0 1px rgba(224,169,59,.35)}
.status-pill.empty{color:var(--dim);background:rgba(255,255,255,.03);box-shadow:inset 0 0 0 1px var(--line)}
.raid-body{padding:16px 18px}

.run{margin-bottom:14px}
.run:last-child{margin-bottom:0}
.run-label{font-family:var(--data);font-size:11px;letter-spacing:.08em;color:var(--dim);
  text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.run-label .tag{color:var(--gold);font-weight:600}
.teams{display:flex;gap:14px;flex-wrap:wrap}
.team{flex:1;min-width:min(100%,300px);background:var(--panel2);border:1px solid var(--line-soft);
  border-radius:11px;padding:11px}
.team.open{border-style:dashed;border-color:#34384a;background:rgba(255,255,255,.012)}
.team-cap{font-family:var(--data);font-size:10.5px;letter-spacing:.06em;color:var(--dim);
  text-transform:uppercase;margin-bottom:9px}
.slot{display:flex;align-items:center;gap:9px;padding:6px 4px;border-radius:7px}
.slot+.slot{border-top:1px solid var(--line-soft)}
.slot .name{flex:1;font-weight:600;font-size:13.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .owner{font-size:11px;color:var(--muted)}
.slot .il{font-family:var(--data);font-size:12px;color:var(--muted)}
.slot.empty .name{color:var(--dim);font-weight:500;font-style:italic}
.slot.empty .glyph{opacity:.5;border-style:dashed}
.glyph.dps.dash{background:transparent;box-shadow:inset 0 0 0 1px var(--dps-line)}
.glyph.sup.dash{background:transparent;box-shadow:inset 0 0 0 1px var(--sup-line)}

.foot{margin-top:14px;padding-top:13px;border-top:1px solid var(--line-soft);
  display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.diag{font-size:13px;display:flex;align-items:center;gap:8px}
.diag.need{color:var(--amber)} .diag.ok{color:var(--sup)}
.bench{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.bench .bl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-family:var(--data);margin-right:2px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 9px 4px 6px;border-radius:999px;
  font-size:12px;font-weight:600;background:var(--panel2);border:1px solid var(--line)}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip .dot.dps{background:var(--dps)} .chip .dot.sup{background:var(--sup)}
.chip .co{color:var(--muted);font-weight:500;font-size:11px}
.chip .ci{font-family:var(--data);color:var(--dim);font-size:11px}
.empty-state{color:var(--dim);font-size:13.5px;padding:6px 2px;font-style:italic}

/* ---------- settings drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(5,6,10,.6);backdrop-filter:blur(2px);z-index:40;
  opacity:0;pointer-events:none;transition:.2s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(460px,92vw);z-index:41;
  background:var(--panel);border-left:1px solid var(--line);transform:translateX(100%);
  transition:transform .26s cubic-bezier(.4,0,.2,1);overflow-y:auto;
  box-shadow:-20px 0 50px rgba(0,0,0,.4)}
.drawer.open{transform:translateX(0)}
.drawer-in{padding:20px}
.drawer h3{font-family:var(--display);font-size:15px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gold);margin:24px 0 12px}
.drawer h3:first-child{margin-top:4px}
.dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.note{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5}
.brow{background:var(--panel2);border:1px solid var(--line-soft);border-radius:10px;padding:11px;margin-bottom:9px}
.brow-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.brow-top .lab{font-size:12px;color:var(--muted)}
.min-in{width:78px;background:var(--bg);border:1px solid var(--line);border-radius:6px;
  font-family:var(--data);font-size:13px;padding:5px 8px;text-align:right;color:var(--text)}
.min-in:focus{outline:none;border-color:var(--gold-dim)}
.rchips{display:flex;flex-wrap:wrap;gap:6px}
.rchip{font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);color:var(--dim);background:var(--bg);transition:.13s;font-family:var(--data)}
.rchip.on{color:var(--gold-bright);border-color:var(--gold-dim);background:rgba(217,180,91,.08)}
.rchip:hover{border-color:#3a3f52}
.raidrow{display:flex;flex-direction:column;gap:7px;margin-bottom:9px;
  background:var(--panel2);border:1px solid var(--line-soft);border-radius:9px;padding:9px}
.rr-top{display:flex;align-items:center;gap:8px}
.rr-bot{display:flex;align-items:center;gap:8px}
.raidrow input{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:6px 9px;font-size:13px}
.raidrow input:focus{outline:none;border-color:var(--gold-dim)}
.raidrow select{background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12.5px;flex:0 0 auto}
.danger{color:var(--dps);border-color:var(--dps-line)}
.danger:hover{background:var(--dps-soft)}
.close-x{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--muted)}
.close-x:hover{color:var(--text);background:rgba(255,255,255,.05)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--panel);padding-bottom:6px;border-bottom:1px solid var(--line);
  margin:-20px -20px 16px;padding:18px 20px 14px}
.drawer-head .t{font-family:var(--display);letter-spacing:.16em;text-transform:uppercase;font-size:14px;color:var(--gold-bright)}

.savetag{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel2);border:1px solid var(--gold-dim);color:var(--gold-bright);
  font-size:12px;font-weight:600;padding:8px 16px;border-radius:999px;z-index:50;
  opacity:0;transition:.2s;letter-spacing:.03em}
.savetag.show{opacity:1;transform:translateX(-50%) translateY(0)}
.savetag.err{border-color:var(--dps-line);color:var(--dps)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-flex;animation:spin .8s linear infinite}
.refresh-btn:hover{color:var(--teal)!important;background:rgba(86,194,214,.12)!important}

/* item-level gates + requirement reference + validation */
.req-badge{font-family:var(--data);font-size:11px;color:var(--muted);border:1px solid var(--line);
  border-radius:6px;padding:3px 8px;letter-spacing:.02em}
.req-badge b{color:var(--gold-bright);font-weight:600}
.reqgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.reqfam{background:var(--panel2);border:1px solid var(--line-soft);border-radius:9px;padding:9px 11px}
.reqfam-name{font-family:var(--display);font-size:12px;letter-spacing:.06em;color:var(--gold);margin-bottom:7px}
.reqdiffs{display:flex;flex-direction:column;gap:4px}
.reqd{display:flex;justify-content:space-between;font-size:12px;gap:10px}
.reqd i{color:var(--muted);font-style:normal}
.reqd b{font-family:var(--data);color:var(--text);font-weight:600}
.cnt{font-family:var(--data);font-size:11px;color:var(--dim);margin-left:auto}
.cnt.over{color:var(--dps)}
.brow.bad{border-color:var(--amber);box-shadow:inset 0 0 0 1px rgba(224,169,59,.25)}
.brk-warn{display:flex;gap:7px;align-items:flex-start;margin-top:10px;color:var(--amber);font-size:12px;line-height:1.45}
.brk-warn svg{flex-shrink:0;margin-top:1px}
.req-in{width:64px;flex:none!important;text-align:right;font-family:var(--data)}
.rr-top .lbl-in{flex:1 1 auto;min-width:0}
.rr-bot .fam-in{flex:1 1 auto;min-width:0;font-size:12.5px}
.raidrow.head{color:var(--dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;
  font-family:var(--data);padding:0 2px;margin-bottom:0}
.raidrow.head span:first-child{flex:1}

/* ---------- manual builder ---------- */
.build-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:18px}
.build-bar .lbl{font-size:13px;color:var(--muted)}
.raid-pick{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:9px 12px;
  font-size:14px;color:var(--text);min-width:170px}
.raid-pick:focus{outline:none;border-color:var(--gold-dim)}
.party-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;align-items:start;margin-bottom:8px}
.raidgroup{margin-bottom:18px}
.raidgroup-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  padding:0 2px 9px;margin-bottom:11px;border-bottom:1px solid var(--line-soft)}
.rg-name{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:.02em;color:var(--gold-bright)}
.rg-meta{font-family:var(--data);font-size:11.5px;color:var(--dim)}
.party{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.party-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line-soft)}
.pname2{flex:1;background:transparent;border:none;border-bottom:1px dashed transparent;font-family:var(--display);
  font-weight:600;font-size:14px;letter-spacing:.03em;padding:3px 2px;border-radius:4px;min-width:60px;color:var(--text)}
.pname2:hover{border-bottom-color:var(--line)}
.pname2:focus{outline:none;border-bottom-color:var(--gold-dim)}
.party-head .icon-btn{width:26px;height:26px}
.party-body{padding:10px 12px}
.pmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pmeta .size-badge,.pmeta .req-badge{font-size:10px;padding:2px 6px}
.pmeta-fill{font-family:var(--data);font-size:11px;color:var(--dim);margin-left:auto}
.teams{display:flex;flex-direction:column;gap:8px}
.team{background:var(--panel2);border:1px solid var(--line-soft);border-radius:9px;padding:7px 8px}
.team.nocap{padding:5px 8px}
.team-cap{font-family:var(--data);font-size:9.5px;letter-spacing:.07em;color:var(--dim);
  text-transform:uppercase;margin-bottom:5px}
.slot{display:flex;align-items:center;gap:7px;padding:4px 3px;border-radius:6px}
.slot+.slot{border-top:1px solid var(--line-soft)}
.slot .name{flex:1;font-weight:600;font-size:12.5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot .owner{font-size:10.5px;color:var(--muted)}
.slot .il{font-family:var(--data);font-size:11px;color:var(--muted)}
.party-grid .glyph{width:21px;height:21px}
.slot.assignable{cursor:pointer;border:1px dashed #34384a;border-radius:7px;margin:1px 0}

<script>
/* =========================================================
   Data model
   ========================================================= */
const DEFAULT_RAIDS = [
  { label:"ACT4",      teams:2, req:1700, family:"Act 4" },
  { label:"Kaz NM",    teams:2, req:1710, family:"Kazeros" },
  { label:"Kaz HM",    teams:2, req:1730, family:"Kazeros" },
  { label:"Serca NM",  teams:1, req:1710, family:"Serca" },
  { label:"Serca HM",  teams:1, req:1730, family:"Serca" },
  { label:"Serca NMR", teams:1, req:1740, family:"Serca" },
  { label:"Cathedral", teams:1, req:1720, family:"Cathedral" },
  { label:"Cath NMR",  teams:1, req:1750, family:"Cathedral" },
];
const REQ_TABLE = [
  { family:"Act 4",     diffs:[["Normal",1700],["Hard",1720]] },
  { family:"Kazeros",   diffs:[["Normal",1710],["Hard",1730]] },
  { family:"Serca",     diffs:[["Normal",1710],["Hard",1730],["Nightmare",1740]] },
  { family:"Cathedral", diffs:[["Normal",1700],["Hard",1720],["Nightmare",1750]] },
];
const RAID_CAP = 3; // each character may run at most 3 raids per week

const DEFAULT_PLAYERS = [];

let state = { tab:"roster", players:null, raids:null, parties:null, apiKey:"", proxy:"" };
let pick = null; // active picker target {partyId, slotIdx}
let raidPick = null; // remembered selection in the Add-party dropdown
const refreshing = new Set(); // character ids currently being refreshed
let friendDraft = null; // { pname, region, rosterGuid, add:[], skip:[] } during import selection

/* =========================================================
   Persistence
   ========================================================= */
const KEY = "wartable:v3";
// Works both inside Claude (window.storage) and as a plain hosted page (localStorage).
const store = {
  async get(k){
    if(typeof window!=="undefined" && window.storage && window.storage.get){ return await window.storage.get(k); }
    try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; }
  },
  async set(k,v){
    if(typeof window!=="undefined" && window.storage && window.storage.set){ return await window.storage.set(k,v); }
    try{ localStorage.setItem(k,v); }catch(e){} return {value:v};
  }
};
async function loadState(){
  try{
    const r = await store.get(KEY);
    if(r && r.value){ apply(JSON.parse(r.value)); return; }
  }catch(e){}
  applyDefaults();
}
function apply(d){
  state.players  = d.players  || clone(DEFAULT_PLAYERS);
  state.raids    = d.raids    || clone(DEFAULT_RAIDS);
  state.parties  = d.parties  || [];
}
function applyDefaults(){
  state.players = clone(DEFAULT_PLAYERS);
  state.raids   = clone(DEFAULT_RAIDS);
  state.parties = [];
}
let saveTimer=null;
async function save(quiet){
  const payload = JSON.stringify({players:state.players,raids:state.raids,parties:state.parties});
  try{ await store.set(KEY,payload); if(!quiet) flashSaved(); }catch(e){}
  boardSchedulePush();
}

/* API key stored separately so "reset to defaults" never wipes it */
const AKEY = "wartable:apikey";
async function loadApiKey(){ try{ const r=await store.get(AKEY); state.apiKey = (r&&r.value)||""; }catch(e){ state.apiKey=""; } }
async function saveApiKey(){ try{ await store.set(AKEY, state.apiKey||""); }catch(e){} }
const PKEY = "wartable:proxy";
async function loadProxy(){ try{ const r=await store.get(PKEY); state.proxy = (r&&r.value)||""; }catch(e){ state.proxy=""; } }
async function saveProxy(){ try{ await store.set(PKEY, state.proxy||""); }catch(e){} }

/* =========================================================
   Shared board (Cloudflare D1 Worker) — open viewing, password to edit
   ========================================================= */
const BKEY = "wartable:board";
let board = { url:"", id:"", name:"", pw:"", mode:"off", lastUpdated:0 }; // mode: off|view|edit
let boardList = [];
let boardDirty=false, boardPushing=false, boardPushQueued=false, boardPushTimer=null, boardPollTimer=null, boardApplying=false;
async function loadBoard(){ try{ const r=await store.get(BKEY); if(r&&r.value){ const b=JSON.parse(r.value); Object.assign(board,{url:b.url||"",id:b.id||"",name:b.name||"",pw:b.pw||"",mode:b.mode||"off",lastUpdated:0}); } }catch(e){} }
async function persistBoard(){ try{ await store.set(BKEY, JSON.stringify({url:board.url,id:board.id,name:board.name,pw:board.pw,mode:board.mode})); }catch(e){} }
function boardBase(){ return (board.url||"").replace(/\/+$/,''); }
async function boardApi(path, opts){
  const r = await fetch(boardBase()+path, opts||{});
  let data=null; try{ data=await r.json(); }catch(e){}
  if(!r.ok) throw (data&&data.error) || ("HTTP "+r.status);
  return data;
}
function boardPayload(){
  return {
    players: state.players.map(p=>({ id:p.id, name:p.name||"", region:p.region||"", roster_guid:p.rosterGuid||"",
      chars:(p.chars||[]).map(c=>({ id:c.id, name:c.name||"", ilvl:c.ilvl, role:c.role||"dps", cp:(c.cp==null?null:c.cp), cls:c.cls||"" })) })),
    raids: state.raids.map(r=>({ label:r.label||"", family:r.family||"", req:r.req||0, teams:r.teams||1 })),
    parties: state.parties.map(pt=>({ id:pt.id, raidLabel:pt.raidLabel||"", name:pt.name||"",
      slots:(pt.slots||[]).map(sl=>({ team:sl.team||0, role:sl.role||"dps", charId:sl.charId||null })) }))
  };
}
function applyBoardData(data){
  const charsBy={}; (data.characters||[]).forEach(c=>{ (charsBy[c.player_id]=charsBy[c.player_id]||[]).push(c); });
  state.players = (data.players||[]).map(p=>({
    id:p.id, name:p.name||"", region:p.region||undefined, rosterGuid:p.roster_guid||undefined,
    chars:(charsBy[p.id]||[]).sort((a,b)=>(a.sort||0)-(b.sort||0)).map(c=>({ id:c.id, name:c.name||"", ilvl:c.ilvl, role:c.role||"dps", cp:(c.cp==null?null:c.cp), cls:c.cls||"" }))
  }));
  state.raids = (data.raids||[]).map(r=>({ label:r.label||"", family:r.family||"", req:r.req||0, teams:r.teams||1 }));
  const slotsBy={}; (data.slots||[]).forEach(s=>{ (slotsBy[s.party_id]=slotsBy[s.party_id]||[]).push(s); });
  state.parties = (data.parties||[]).map(pt=>({
    id:pt.id, raidLabel:pt.raid_label||"", name:pt.name||"",
    slots:(slotsBy[pt.id]||[]).sort((a,b)=>(a.slot_idx||0)-(b.slot_idx||0)).map(s=>({ team:s.team||0, role:s.role||"dps", charId:s.char_id||null }))
  }));
  board.lastUpdated = (data.board&&data.board.updated_at)||0;
}
async function boardLoad(){
  if(!board.id||!boardBase()) return;
  const data = await boardApi("/board/"+encodeURIComponent(board.id));
  boardApplying=true; applyBoardData(data); await save(true); boardApplying=false;
  boardDirty=false; render(); renderSettings();
}
function boardSchedulePush(){
  if(board.mode!=="edit"||boardApplying) return;
  boardDirty=true; clearTimeout(boardPushTimer); boardPushTimer=setTimeout(boardPush, 1200);
}
async function boardPush(){
  if(board.mode!=="edit"||!board.id) return;
  if(boardPushing){ boardPushQueued=true; return; }
  boardPushing=true;
  try{
    const res = await boardApi("/board/"+encodeURIComponent(board.id)+"/sync", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ password:board.pw, state:boardPayload() })
    });
    board.lastUpdated = res.updated_at||Date.now(); boardDirty=false; setSyncTag("Synced "+clockNow());
  }catch(e){ setSyncTag("Sync failed: "+e, true); }
  finally{ boardPushing=false; if(boardPushQueued){ boardPushQueued=false; boardPush(); } }
}
function boardStartPoll(){
  clearInterval(boardPollTimer);
  if(board.mode==="off"||!board.id) return;
  boardPollTimer=setInterval(async()=>{
    if(boardPushing||boardDirty) return; // don't clobber pending local edits
    try{
      const data = await boardApi("/board/"+encodeURIComponent(board.id));
      const remote = (data.board&&data.board.updated_at)||0;
      if(remote>board.lastUpdated){
        boardApplying=true; applyBoardData(data); await save(true); boardApplying=false;
        boardDirty=false; render(); renderSettings(); setSyncTag("Updated "+clockNow());
      }
    }catch(e){}
  }, 20000);
}
function clockNow(){ try{ return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }catch(e){ return ""; } }
function setSyncTag(msg, err){ const el=document.getElementById("sync-tag"); if(el){ el.textContent=msg; el.className="sync-tag"+(err?" err":""); } }
function boardDisconnect(){ clearInterval(boardPollTimer); Object.assign(board,{id:"",name:"",pw:"",mode:"off",lastUpdated:0}); persistBoard(); renderSettings(); toast("Disconnected — using local copy"); }
async function boardListFetch(){
  if(!boardBase()){ toast("Enter the Worker URL first", true); return; }
  try{ boardList = await boardApi("/boards") || []; renderSettings(); }
  catch(e){ toast("Couldn't list boards: "+e, true); }

/* Roster import via api.ags.lol (two-step: character -> roster) */
const API_BASE = "https://api.ags.lol/api/v1/mirth";
// When a proxy is set, requests go to  <proxy>?url=<encoded target>.
function apiUrl(path){
  const target = API_BASE + path;
  if(state.proxy){ const p=state.proxy.replace(/\/+$/,""); return p + (p.includes("?")?"&":"?") + "url=" + encodeURIComponent(target); }
  return target;
}
const SUP_HINTS = ["holyknight","paladin","bard","artist","painter","valkyrie"];
function roleForClass(cls){
  const s = String(cls||"").toLowerCase();
  return SUP_HINTS.some(h=>s.includes(h)) ? "sup" : "dps";
}
// Authoritative: max_combat_power.id (1 = DPS, 2 = SUP). Falls back to class name.
function roleFromApi(c){
  const id = c && c.max_combat_power && c.max_combat_power.id;
  if(id===2) return "sup";
  if(id===1) return "dps";
  return roleForClass(c && c.class);
}
const cpOf = c => (c && c.max_combat_power && c.max_combat_power.score!=null) ? round2(c.max_combat_power.score) : null;
const round2 = v => { const n=parseFloat(v); return isNaN(n)?0:Math.round(n*100)/100; };
async function fetchRoster(region, name){
  if(!state.apiKey) throw "Enter your API key first (top-right of the Roster tab).";
  const h = { headers:{ "x-api-key": state.apiKey } };
  let cRes;
  try{ cRes = await fetch(apiUrl(`/characters/by-name/${encodeURIComponent(region)}/${encodeURIComponent(name)}`), h); }
  catch(e){ throw "Could not reach the API — your browser is likely blocked by CORS. Add a proxy URL below."; }
  if(cRes.status===401 || cRes.status===403) throw "API key was rejected (401/403). Check the key.";
  if(cRes.status===404) throw `No character named “${name}” found in ${region}.`;
  if(!cRes.ok) throw `Character lookup failed (HTTP ${cRes.status}).`;
  const ch = await cRes.json();
  const rg = ch && ch.roster_guid;
  if(!rg) throw "That character has no roster id in the response.";
  let rRes;
  try{ rRes = await fetch(apiUrl(`/rosters/by-guid/${encodeURIComponent(rg)}`), h); }
  catch(e){ throw "Could not reach the API on the roster step — likely CORS. Add a proxy URL below."; }
  if(!rRes.ok) throw `Roster lookup failed (HTTP ${rRes.status}).`;
  const roster = await rRes.json();
  return { searched: ch, roster };
}
// Pull one character's current stats by region + name.
async function fetchCharacter(region, name){
  if(!state.apiKey) throw "Set your API key first (top-right of the Roster tab).";
  let res;
  try{ res = await fetch(apiUrl(`/characters/by-name/${encodeURIComponent(region)}/${encodeURIComponent(name)}`), { headers:{ "x-api-key":state.apiKey } }); }
  catch(e){ throw "Couldn't reach the API — likely CORS. Set a proxy URL in Add a friend."; }
  if(res.status===401 || res.status===403) throw "API key was rejected.";
  if(res.status===404) throw `“${name}” not found in ${region}.`;
  if(!res.ok) throw `Lookup failed (HTTP ${res.status}).`;
  return await res.json();
}
function applyApiChar(c, data){ c.ilvl=round2(data.item_level); c.role=roleFromApi(data); c.cp=cpOf(data); c.cls=data.class||c.cls||""; }
async function refreshChar(pid, cid){
  if(refreshing.has(cid)) return;
  const p=findPlayer(pid); const c=p && p.chars.find(x=>x.id===cid); if(!c) return;
  if(!state.apiKey){ toast("Set your API key first", true); return; }
  if(!p.region){ toast("No region stored — re-import this roster to refresh", true); return; }
  refreshing.add(cid); renderRoster();
  try{
    const data = await fetchCharacter(p.region, c.name);
    applyApiChar(c, data); save(true); toast("Updated "+c.name);
  }catch(e){ toast(typeof e==="string"?e:"Refresh failed", true); }
  finally{ refreshing.delete(cid); renderRoster(); renderStats(); }
}
async function refreshRoster(pid){
  const p=findPlayer(pid); if(!p) return;
  if(p.chars.some(c=>refreshing.has(c.id))) return;
  if(!state.apiKey){ toast("Set your API key first", true); return; }
  if(!p.rosterGuid){ toast("No roster id stored — re-import to refresh all", true); return; }
  p.chars.forEach(c=>refreshing.add(c.id)); renderRoster();
  try{
    let res;
    try{ res = await fetch(apiUrl(`/rosters/by-guid/${encodeURIComponent(p.rosterGuid)}`), { headers:{ "x-api-key":state.apiKey } }); }
    catch(e){ throw "Couldn't reach the API — likely CORS."; }
    if(!res.ok) throw `Roster refresh failed (HTTP ${res.status}).`;
    const roster = await res.json();
    const byName={}; (roster.characters||[]).forEach(rc=>{ if(rc&&rc.name) byName[rc.name]=rc; });
    let n=0; p.chars.forEach(c=>{ const rc=byName[c.name]; if(rc){ applyApiChar(c, rc); n++; } });
    save(true); toast(`Refreshed ${n} character${n===1?'':'s'}`);
  }catch(e){ toast(typeof e==="string"?e:"Refresh failed", true); }
  finally{ p.chars.forEach(c=>refreshing.delete(c.id)); renderRoster(); renderStats(); }
}

/* =========================================================
   Lookups
   ========================================================= */
function raidByLabel(label){ return state.raids.find(r=>r.label===label); }
// The grouping key for the "one difficulty per raid" + cap rules. A raid's
// explicit Family if set, otherwise its own label (so a custom raid still
// counts as one distinct raid and can't be doubled up).
function familyKey(raidOrLabel){
  const r = typeof raidOrLabel==='string' ? raidByLabel(raidOrLabel) : raidOrLabel;
  if(r){ const f=(r.family||'').trim(); return f || r.label; }
  return typeof raidOrLabel==='string' ? raidOrLabel : '';
}
// normalized form used for matching, so "Cathedral", "cathedral" and "Cathedral " all link together
const famNorm = s => String(s||'').trim().toLowerCase().replace(/\s+/g,' ');
function charById(id){
  for(const p of state.players) for(const c of p.chars)
    if(c.id===id) return { id:c.id, name:c.name, ilvl:parseFloat(c.ilvl), role:c.role, cls:c.cls||"", ownerId:p.id, ownerName:p.name };
  return null;
}
function slotsForRaid(raid){
  const teams = raid && raid.teams===2 ? 2 : 1;
  const slots=[];
  for(let t=0;t<teams;t++){
    slots.push({role:'sup',team:t,charId:null});
    slots.push({role:'dps',team:t,charId:null});
    slots.push({role:'dps',team:t,charId:null});
    slots.push({role:'dps',team:t,charId:null});
  }
  return slots;
}
function partyOwners(party){
  const s=new Set();
  party.slots.forEach(sl=>{ if(sl.charId){ const c=charById(sl.charId); if(c) s.add(c.ownerId); } });
  return s;
}
// families a character is already committed to (across all parties)
function charFamilies(charId, exceptPartyId){
  const fams=new Set();
  state.parties.forEach(pt=>{
    if(exceptPartyId && pt.id===exceptPartyId) return;
    if(pt.slots.some(sl=>sl.charId===charId)){
      const fk = famNorm(familyKey(pt.raidLabel)); if(fk) fams.add(fk);
    }
  });
  return fams;
}
const charRaidCount = id => charFamilies(id).size;
// reasons a character can't take a given slot (empty array = ok)
function blockReasons(char, party, raid, slotRole){
  if(char.role!==slotRole) return ["wrong-role"]; // filtered out before display
  const reasons=[];
  if(partyOwners(party).has(char.ownerId)) reasons.push("Roster already in this party");
  if(raid && char.ilvl < (raid.req||0)) reasons.push("Below item lvl "+raid.req);
  const fams=charFamilies(char.id, party.id);
  const fkRaw = familyKey(raid || party.raidLabel);
  const fk = famNorm(fkRaw);
  if(fk && fams.has(fk)) reasons.push("Already on "+fkRaw);
  else if(fams.size>=RAID_CAP) reasons.push("At "+RAID_CAP+"-raid cap");
  return reasons;
}
function purgeChar(charId){
  state.parties.forEach(pt=>pt.slots.forEach(sl=>{ if(sl.charId===charId) sl.charId=null; }));
}
function purgePlayer(playerId){
  const p=state.players.find(x=>x.id===playerId); if(!p) return;
  p.chars.forEach(c=>purgeChar(c.id));
}

/* =========================================================
   Stats
   ========================================================= */
function renderStats(){
  const players=state.players.length;
  let dps=0,sup=0;
  state.players.forEach(p=>p.chars.forEach(c=>{ c.role==='dps'?dps++:sup++; }));
  let open=0;
  state.parties.forEach(pt=>pt.slots.forEach(sl=>{ if(!sl.charId) open++; }));
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${players}</div><div class="l">Players in group</div></div>
    <div class="stat s-dps"><div class="n">${dps}</div><div class="l">DPS characters</div></div>
    <div class="stat s-sup"><div class="n">${sup}</div><div class="l">Support characters</div></div>
    <div class="stat s-fill"><div class="n">${state.parties.length}</div><div class="l">Parties built</div></div>`;
}

function charRowHTML(p, c){

function teamHTML(party, teamIdx, cap){
  const base = teamIdx*4;
  const inner = [base, base+1, base+2, base+3].map(i=>slotHTML(party,i)).join("");
  return `<div class="team${cap?'':' nocap'}">${cap?`<div class="team-cap">${cap}</div>`:''}${inner}</div>`;
}
function renderParty(party){
  const r = raidByLabel(party.raidLabel);
  const teams = r && r.teams===2 ? 2 : 1;
  const caps = teams===2 ? ["Team A","Team B"] : [null];
  const teamsHTML = caps.map((cap,t)=>teamHTML(party,t,cap)).join("");
  const filled = party.slots.filter(s=>s.charId).length;
  const total = party.slots.length;
  const open = total-filled;
  const sizeBadge = `<span class="size-badge"><b>${teams===2?'8':'4'}-man</b></span>`;
  const reqBadge = r&&r.req ? `<span class="req-badge">≥ <b>${r.req}</b></span>` : '';
  const gone = r ? '' : `<span class="req-badge" style="color:var(--dps);border-color:var(--dps-line)">raid removed</span>`;
  const foot = open===0
    ? `<div class="diag ok">${checkIcon()} Full party</div>`
    : `<div class="diag need">${warnIcon()} ${open} open · PUG / BOT</div>`;
  return `
    <div class="party">
      <div class="party-head">
        <input class="pname2" value="${esc(party.name)}" data-field="party-name" data-party="${party.id}" />
        <button class="icon-btn" data-action="del-party" data-party="${party.id}" title="Delete party">${SVG.trash}</button>
      </div>
      <div class="party-body">
        <div class="pmeta">${sizeBadge}${reqBadge}${gone}<span class="pmeta-fill">${filled}/${total}</span></div>
        <div class="teams">${teamsHTML}</div>
        <div class="foot">${foot}</div>
      </div>
    </div>`;
}
// Characters eligible for a raid (meet its ilvl gate) who are NOT already committed to that raid's family.
function eligibleUnassigned(raid){
  const fk = famNorm(familyKey(raid));
  const req = raid.req || 0;
  const sup=[], dps=[];
  state.players.forEach(p=>p.chars.forEach(c=>{
    const il = parseFloat(c.ilvl);
    if(isNaN(il) || il < req) return;          // not eligible by item level
    if(charFamilies(c.id).has(fk)) return;     // already running this raid family
    const entry = { id:c.id, name:c.name, ilvl:il, role:c.role, cls:c.cls||"", ownerName:p.name };
    (c.role==='sup'?sup:dps).push(entry);
  }));
  const byIl=(a,b)=>b.ilvl-a.ilvl;
  sup.sort(byIl); dps.sort(byIl);
  return { sup, dps };
}
function availChip(c){
  return `<span class="achip ${c.role}" title="${esc((CLASS_NAMES[c.cls]||c.cls||'')+' · '+c.ownerName)}">
      ${roleGlyph(c.role,false,c.cls)}<span class="an">${esc(c.name)}</span><span class="ao">${esc(c.ownerName)}</span><span class="ai">${fmtIl(c.ilvl)}</span></span>`;
}
function renderAvailPanel(){
  if(!state.raids.length) return '';
  const blocks = state.raids.map(raid=>{
    const { sup, dps } = eligibleUnassigned(raid);
    const supHtml = sup.length ? sup.map(availChip).join("") : '<span class="anone">none available</span>';
    const dpsHtml = dps.length ? dps.map(availChip).join("") : '<span class="anone">none available</span>';
    const size = raid.teams===2 ? '8-man' : '4-man';
    const famName = familyKey(raid);
    return `<details class="availraid">
      <summary>
        <span class="ar-name">${esc(raid.label)}</span>
        <span class="ar-sub">${size} · ≥${raid.req||0} · family: ${esc(famName)}</span>
        <span class="ar-counts"><b class="sup">${sup.length}</b> SUP · <b class="dps">${dps.length}</b> DPS</span>
      </summary>
      <div class="ar-body">
        <div class="ar-group"><span class="ar-lbl sup">Supports</span><div class="ar-chips">${supHtml}</div></div>
        <div class="ar-group"><span class="ar-lbl dps">DPS</span><div class="ar-chips">${dpsHtml}</div></div>
      </div>
    </details>`;
  }).join("");
  return `<div class="availpanel">
    <div class="avail-head">Available by raid <span>— eligible &amp; not yet running that raid</span></div>
    ${blocks}
  </div>`;
}
function renderBuild(){
  const sel = (raidPick && state.raids.some(r=>r.label===raidPick)) ? raidPick : (state.raids[0]&&state.raids[0].label);
  const options = state.raids.map(r=>`<option value="${esc(r.label)}" ${r.label===sel?'selected':''}>${esc(r.label)} · ${r.teams===2?'8-man':'4-man'} · ≥${r.req||0}</option>`).join("");
  let parties;
  if(!state.parties.length){
    parties = `<div class="party-empty">No parties yet. Pick a raid above and press “Add party”, then tap a slot to drop in a character.</div>`;
  } else {
    const order = state.raids.map(r=>r.label);
    const groups = {};
    state.parties.forEach(pt=>{ (groups[pt.raidLabel] = groups[pt.raidLabel] || []).push(pt); });
    const labels = Object.keys(groups).sort((a,b)=>{
      const ia=order.indexOf(a), ib=order.indexOf(b);
      return (ia<0?1e9:ia)-(ib<0?1e9:ib);
    });
    parties = labels.map(label=>{
      const r = raidByLabel(label);
      const meta = r ? `${r.teams===2?'8-man':'4-man'} · ≥${r.req||0} · family: ${esc(familyKey(r))}` : 'raid removed';
      const n = groups[label].length;
      return `<div class="raidgroup">
        <div class="raidgroup-head">
          <span class="rg-name">${esc(label)}</span>
          <span class="rg-meta">${meta} · ${n} part${n===1?'y':'ies'}</span>
        </div>
        <div class="party-grid">${groups[label].map(renderParty).join("")}</div>
      </div>`;
    }).join("");
  }

  document.getElementById("view").innerHTML = `
    <div class="section-head">
      <div><div class="eyebrow">The War Table</div><h2>Build your parties</h2></div>
      <div class="hint">Tap any slot to assign a character. The picker only offers valid choices — right role, meets the item-level gate, one roster per party, max ${RAID_CAP} raids each, one difficulty per raid. Empty slots are your PUG / BOT fills.</div>
    </div>
    <div class="build-bar">
      <span class="lbl">Raid</span>
      <select class="raid-pick" id="raid-pick" data-field="raid-pick">${options}</select>
      <button class="btn gold" data-action="add-party">${SVG.plus} Add party</button>
    </div>
    ${parties}
    ${renderAvailPanel()}`;
}

/* =========================================================
   Picker modal
   ========================================================= */
function openPicker(partyId, slotIdx){ pick={partyId,slotIdx}; renderPicker(); document.getElementById("pscrim").classList.add("open"); setTimeout(()=>{ const s=document.getElementById("cand-search"); if(s) s.focus(); },60); }
function closePicker(){ pick=null; document.getElementById("pscrim").classList.remove("open"); }
function renderPicker(){
  const party = state.parties.find(p=>p.id===pick.partyId); if(!party){ closePicker(); return; }
  const slot = party.slots[pick.slotIdx];
  const raid = raidByLabel(party.raidLabel);
  const cands = [];
  state.players.forEach(p=>p.chars.forEach(c=>{
    if(c.role!==slot.role) return;
    const ch = { id:c.id, name:c.name, ilvl:parseFloat(c.ilvl), role:c.role, cls:c.cls||"", ownerId:p.id, ownerName:p.name };
    cands.push({ ch, reasons: blockReasons(ch, party, raid, slot.role) });
  }));
  cands.sort((a,b)=>{
    const ao=a.reasons.length>0, bo=b.reasons.length>0;
    if(ao!==bo) return ao?1:-1;            // assignable first
    return (b.ch.ilvl||0)-(a.ch.ilvl||0);  // then by ilvl
  });
  const list = cands.length ? cands.map(({ch,reasons})=>{
    const ok = reasons.length===0;
    const attr = ok ? `data-action="pick-char" data-charid="${ch.id}"` : '';
    const search = esc(`${ch.name} ${ch.ownerName} ${CLASS_NAMES[ch.cls]||ch.cls||''}`.toLowerCase());
    return `<div class="cand ${ok?'':'disabled'}" ${attr} data-search="${search}">
      ${roleGlyph(ch.role,false,ch.cls)}
      <span class="nm">${esc(ch.name)}</span>
      <span class="ow">${esc(ch.ownerName)}</span>
      <span class="il2">${fmtIl(ch.ilvl)}</span>
      ${ok?'':`<span class="why">${esc(reasons[0])}</span>`}
    </div>`;
  }).join("") : `<div class="cand-empty">No ${slot.role==='dps'?'DPS':'support'} characters in your roster.</div>`;

  document.getElementById("picker").innerHTML = `
    <div class="modal-head">
      ${roleGlyph(slot.role)}
      <div style="flex:1;min-width:0">
        <div class="mt">Assign ${slot.role==='dps'?'DPS':'Support'}</div>
        <div class="ms">${esc(party.name)}${raid&&raid.req?` · item lvl ≥ ${raid.req}`:''}</div>
      </div>
      <button class="close-x" data-action="close-picker">${SVG.x}</button>
    </div>
    ${cands.length?`<div class="cand-searchbar"><input id="cand-search" class="cand-search" data-field="cand-search" placeholder="Search name, roster or class…" autocomplete="off" spellcheck="false" /></div>`:''}
    <div class="cand-list">${list}<div class="cand-empty" id="cand-none" style="display:none">No matches.</div></div>
    <div class="modal-foot"><button class="btn ghost" data-action="close-picker">Cancel</button></div>`;
}
function filterCandidates(q){
  q=(q||"").trim().toLowerCase();
  let vis=0;
  document.querySelectorAll('#picker .cand').forEach(r=>{
    const show = !q || (r.getAttribute('data-search')||'').includes(q);
    r.style.display = show ? '' : 'none'; if(show) vis++;
  });
  const none=document.getElementById('cand-none'); if(none) none.style.display = vis ? 'none' : '';
}

function fErr(msg){ return `<div class="f-err">${warnIcon()}<span>${esc(msg)}</span></div>`; }
async function importFriend(){
  const regionEl=document.getElementById("f-region"), nameEl=document.getElementById("f-name");
  const statusEl=document.getElementById("f-status"), go=document.getElementById("f-go");
  if(!regionEl) return;
  const region=regionEl.value, name=(nameEl.value||"").trim();
  if(!state.apiKey){ statusEl.innerHTML=fErr("Enter your API key first (top-right of the Roster tab)."); return; }
  if(!name){ statusEl.innerHTML=fErr("Type a character name."); nameEl.focus(); return; }
  go.disabled=true; statusEl.innerHTML=`<span class="f-load">Fetching ${esc(name)} · ${esc(region)} …</span>`;
  try{
    const { searched, roster } = await fetchRoster(region, name);
    const chars=(roster.characters||[])
      .filter(c=>c && c.name)
      .map(c=>({ id:uid(), name:c.name, ilvl:round2(c.item_level), role:roleFromApi(c), cp:cpOf(c), cls:c.class||"" }))
      .sort((a,b)=>b.ilvl-a.ilvl);
    if(!chars.length){ statusEl.innerHTML=fErr("That roster came back with no characters."); go.disabled=false; return; }
    friendDraft = {
      pname: (searched && searched.name) ? searched.name : name,
      region: (roster.region||region||"").toUpperCase(),
      rosterGuid: roster.guid||"",
      add: chars,
      skip: []
    };
    renderFriend(); // -> selection step
  }catch(e){
    statusEl.innerHTML=fErr(typeof e==="string"?e:((e&&e.message)||"Request failed."));
    if(go) go.disabled=false;
  }
}

      </div>
      <div class="rr-bot">
        <input class="fam-in" value="${esc(r.family||'')}" data-field="raid-family" data-ri="${ri}" placeholder="Family" title="Group difficulties of the same raid under one family" />
        <input class="req-in" type="number" value="${esc(r.req||'')}" data-field="raid-req" data-ri="${ri}" title="Item level required" placeholder="ilvl" />
        <select data-field="raid-teams" data-ri="${ri}">
          <option value="1" ${r.teams===1?'selected':''}>4-man</option>
          <option value="2" ${r.teams===2?'selected':''}>8-man</option>
        </select>
      </div>
    </div>`).join("");

  const reqRef = REQ_TABLE.map(g=>`
    <div class="reqfam">
      <div class="reqfam-name">${esc(g.family)}</div>
      <div class="reqdiffs">${g.diffs.map(d=>`<span class="reqd"><i>${d[0]}</i><b>${d[1]}</b></span>`).join("")}</div>
    </div>`).join("");

  const dEl = document.getElementById("drawer");
  const dScroll = dEl ? dEl.scrollTop : 0;
  document.getElementById("drawer-in").innerHTML = `
    <div class="drawer-head">
      <span class="t">Raids &amp; Gates</span>
      <button class="close-x" data-action="close-settings">${SVG.x}</button>
    </div>

    <div class="dhead"><h3 style="margin-top:0">Item level gates</h3></div>
    <p class="note">Entry requirement for each raid difficulty, for reference. The party picker won't let you seat a character below the gate of the raid it's joining.</p>
    <div class="reqgrid">${reqRef}</div>

    <h3>Raids</h3>
    <p class="note">Name, family, item-level gate and size for each raid in the “Add party” menu. <b>Family</b> is what links a raid's difficulties: give every Serca tier the family “Serca” and a character can only do one of them, and it counts as one of their ${RAID_CAP} raids. Leave Family blank and the raid stands on its own (its name becomes its family).</p>
    ${raids}
    <button class="btn ghost full" data-action="add-raid">${SVG.plus} Add raid</button>

    <h3>Shared board</h3>
    <p class="note">Store this board on your Cloudflare D1 Worker so your group sees the same rosters and parties. Anyone with the link can view; the board password is needed to edit. Your local copy is the fallback when you're disconnected, and connecting to a board replaces that working copy.</p>
    <div class="fld"><label>Worker URL</label><input class="f-in" data-field="board-url" value="${esc(board.url)}" placeholder="https://wartable-board.you.workers.dev" autocomplete="off" spellcheck="false" /></div>
    ${boardSectionHtml()}

    <h3>Data</h3>
    <p class="note">Everything saves automatically on this device.</p>
    <button class="btn danger full" data-action="reset-data">Reset to defaults</button>`;
  if(dEl) dEl.scrollTop = dScroll;
}

/* =========================================================
   Dispatch
   ========================================================= */
function render(){
  renderStats();
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
  if(state.tab==="roster") renderRoster(); else renderBuild();
}
const findPlayer = id => state.players.find(p=>p.id===id);
const findChar = (pid,cid)=>{ const p=findPlayer(pid); return p&&p.chars.find(c=>c.id===cid); };

/* =========================================================
   Events
   ========================================================= */
document.addEventListener("click", e=>{
  const el = e.target.closest("[data-action]"); if(!el) return;
  const a = el.dataset.action;
  switch(a){
    case "tab": state.tab=el.dataset.tab; render(); break;
    case "open-settings": openDrawer(true); break;
    case "close-settings": openDrawer(false); break;
    case "close-picker": closePicker(); break;
    case "open-friend": openFriend(); break;
    case "close-friend": closeFriend(); break;
    case "fetch-roster": importFriend(); break;
    case "friend-toggle":{
      if(!friendDraft) break;
      const cid=el.dataset.cid; let i=friendDraft.add.findIndex(c=>c.id===cid);
      if(i>=0){ friendDraft.skip.push(friendDraft.add.splice(i,1)[0]); }
      else{ i=friendDraft.skip.findIndex(c=>c.id===cid); if(i>=0) friendDraft.add.push(friendDraft.skip.splice(i,1)[0]); }
      renderFriend(); break;
    }
    case "friend-all-add": if(friendDraft){ friendDraft.add.push(...friendDraft.skip); friendDraft.skip=[]; renderFriend(); } break;
    case "friend-all-skip": if(friendDraft){ friendDraft.skip.push(...friendDraft.add); friendDraft.add=[]; renderFriend(); } break;
    case "friend-back": friendDraft=null; renderFriend(); break;
    case "friend-confirm":{
      if(!friendDraft) break;
      if(!friendDraft.add.length){ const s=document.getElementById("f-status"); if(s) s.innerHTML=fErr("Pick at least one character to add."); break; }
      const np={ id:uid(), name:friendDraft.pname, region:friendDraft.region, rosterGuid:friendDraft.rosterGuid, chars:friendDraft.add };
      state.players.push(np);
      friendDraft=null; save(); closeFriend(); appendRosterCard(np); break;
    }
    case "add-blank-friend":{
      const np={id:uid(),name:"New friend",chars:[{id:uid(),name:"Character",ilvl:1710,role:"dps"}]};
      state.players.push(np); save(); closeFriend(); appendRosterCard(np); break;
    }
    case "add-player":{
      const np={id:uid(),name:"New friend",chars:[{id:uid(),name:"Character",ilvl:1710,role:"dps"}]};
      state.players.push(np); save(); appendRosterCard(np); break;
    }
    case "del-player":
      purgePlayer(el.dataset.pid);
      state.players=state.players.filter(p=>p.id!==el.dataset.pid);
      save(); renderRoster(); renderStats(); break;
    case "add-char":{
      const p=findPlayer(el.dataset.pid); if(!p) break;
      const c={id:uid(),name:"Character",ilvl:1710,role:"dps"};
      p.chars.push(c);
      const list=document.querySelector(`.char-list[data-pid="${p.id}"]`);
      if(list){
        const empty=list.querySelector('.empty-state'); if(empty) empty.remove();
        list.insertAdjacentHTML('beforeend', charRowHTML(p,c));
        list.scrollTop=list.scrollHeight;             // reveal the new row, no full re-render
      } else { renderRoster(); }
      save(); renderStats(); break;
    }
    case "del-char":{
      const p=findPlayer(el.dataset.pid); if(!p) break;
      purgeChar(el.dataset.cid);
      p.chars=p.chars.filter(c=>c.id!==el.dataset.cid);
      const row=document.querySelector(`.char[data-cid="${el.dataset.cid}"]`);
      if(row && !p.chars.length){ row.remove(); renderRoster(); }   // show empty-state
      else if(row){ row.remove(); }                                  // surgical, keeps scroll
      else { renderRoster(); }
      save(); renderStats(); break;
    }
    case "refresh-char": refreshChar(el.dataset.pid, el.dataset.cid); break;
    case "refresh-roster": refreshRoster(el.dataset.pid); break;

    case "add-party":{
      const label=document.getElementById("raid-pick").value;
      raidPick=label;
      const r=raidByLabel(label); if(!r) break;
      state.parties.push({ id:uid(), raidLabel:label, name:label, slots:slotsForRaid(r) });
      save(); renderBuild(); renderStats(); break;
    }
    case "del-party":
      state.parties=state.parties.filter(p=>p.id!==el.dataset.party);
      save(); renderBuild(); renderStats(); break;
    case "assign-slot":
      openPicker(el.dataset.party, +el.dataset.slot); break;
    case "clear-slot":{
      const pt=state.parties.find(p=>p.id===el.dataset.party);
      if(pt){ pt.slots[+el.dataset.slot].charId=null; save(); renderBuild(); renderStats(); } break;
    }
    case "pick-char":{
      if(!pick) break;
      const pt=state.parties.find(p=>p.id===pick.partyId);
      if(pt){ pt.slots[pick.slotIdx].charId=el.dataset.charid; save(); }
      closePicker(); renderBuild(); renderStats(); break;
    }

    case "add-raid": state.raids.push({label:"New Raid",teams:1,req:0,family:""}); save(); renderSettings(); break;
    case "del-raid": state.raids.splice(+el.dataset.ri,1); save(); renderSettings(); render(); break;
    case "move-raid-up":{
      const i=+el.dataset.ri;
      if(i>0){ const a=state.raids; [a[i-1],a[i]]=[a[i],a[i-1]]; save(); renderSettings(); render(); }
      break;
    }
    case "board-list": boardListFetch(); break;
    case "board-view": boardViewOpen(el.dataset.bid); break;
    case "board-editopen": boardEnterPassword(el.dataset.bid, el.dataset.bname); break;
    case "board-edit": boardEnterPassword(board.id, board.name); break;
    case "board-create": boardCreate(); break;
    case "board-reload": boardLoad().catch(e=>toast("Reload failed: "+e,true)); break;
    case "board-disconnect": boardDisconnect(); break;
    case "move-raid-down":{
      const i=+el.dataset.ri;
      if(i<state.raids.length-1){ const a=state.raids; [a[i],a[i+1]]=[a[i+1],a[i]]; save(); renderSettings(); render(); }
      break;
    }
    case "reset-data": applyDefaults(); save(); renderSettings(); render(); break;
  }
});

document.addEventListener("input", e=>{
  const el=e.target, f=el.dataset.field; if(!f) return;
  if(f==="player-name"){ const p=findPlayer(el.dataset.pid); if(p) p.name=el.value; }
  else if(f==="char-name"){ const c=findChar(el.dataset.pid,el.dataset.cid); if(c) c.name=el.value; }
  else if(f==="char-ilvl"){ const c=findChar(el.dataset.pid,el.dataset.cid); if(c) c.ilvl=el.value; }
  else if(f==="raid-label"){ const r=state.raids[+el.dataset.ri]; if(r) r.label=el.value; }
  else if(f==="raid-family"){ const r=state.raids[+el.dataset.ri]; if(r) r.family=el.value; }
  else if(f==="raid-req"){ const r=state.raids[+el.dataset.ri]; if(r) r.req=parseFloat(el.value)||0; }
  else if(f==="party-name"){ const p=state.parties.find(x=>x.id===el.dataset.party); if(p) p.name=el.value; }
  else if(f==="api-key"){ state.apiKey=el.value.trim(); saveApiKey(); const d=document.querySelector(".apikey-box span"); if(d) d.className=state.apiKey?'dotok':'dotno'; return; }
  else if(f==="proxy-url"){ state.proxy=el.value.trim(); saveProxy(); return; }
  else if(f==="board-url"){ board.url=el.value.trim(); persistBoard(); return; }
  else if(f==="cand-search"){ filterCandidates(el.value); return; }
  else return;
  save(true);
});

document.addEventListener("change", e=>{
  const el=e.target, f=el.dataset.field; if(!f) return;
  if(f==="char-role"){ const c=findChar(el.dataset.pid,el.dataset.cid); if(c){ c.role=el.value; purgeChar(c.id); } save(); renderRoster(); renderStats(); }
  else if(f==="char-ilvl"){ const c=findChar(el.dataset.pid,el.dataset.cid); if(c) c.ilvl=parseFloat(el.value)||0; save(); renderRoster(); renderStats(); }
  else if(f==="raid-teams"){ const r=state.raids[+el.dataset.ri]; if(r) r.teams=parseInt(el.value); save(); renderSettings(); render(); }
  else if(f==="raid-req"){ save(); renderSettings(); render(); }
  else if(f==="raid-pick"){ raidPick=el.value; }
  else if(f==="raid-family"){ save(); render(); }
});

// (modal stray-click handling is done via data-action="noop" on the picker container)

function openDrawer(open){
  document.getElementById("scrim").classList.toggle("open",open);
  document.getElementById("drawer").classList.toggle("open",open);
  if(open) renderSettings();
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closePicker(); closeFriend(); openDrawer(false); }
  if(e.key==="Enter" && document.getElementById("fscrim").classList.contains("open") && e.target.id==="f-name"){ importFriend(); }
});

/* =========================================================
   Boot
   ========================================================= */
(async function(){ await loadApiKey(); await loadProxy(); await loadBoard(); await loadState(); render();
  if(board.mode!=="off" && board.id && boardBase()){ try{ await boardLoad(); }catch(e){ setSyncTag("Offline — local copy", true); } boardStartPoll(); }
})();

</script>
</body>
</html>
